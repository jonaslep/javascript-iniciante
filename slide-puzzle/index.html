<head>

    <title>slide-puzzle</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>

<body>
    <div class="container">
        <h1>Sliding Puzzle &#x1F9E9;</h1>

        </div>
    </div>
