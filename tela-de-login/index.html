<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>tela de login</title>
</head>
<body>

    <div class="container">
        <h2>Login</h2>
        <form id="login-form">
            <div class="email">
                <label>Email:</label>
                <input type="email" id="name-input" placeholder="name@email.com" required>
            </div>
            <div class="key">
                <label>Password:</label>
                <div class="input">
                    <input type="password" id="password-input" placeholder="your password" required>
                    <i class="fa-solid fa-eye"></i>
                </div>
            </div>
            <button>Login</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", (e)=> {
            let icon = document.querySelector('.input i');
            let email = document.querySelector('#name-input');
            let password = document.querySelector('#password-input');

            icon.addEventListener('click', ()=> {
                if (password.type === "password") { 
                    password.type = "text";
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                
                }else {
                    password.type = "password";
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            })
        })
    </script>
</body>
</html>
