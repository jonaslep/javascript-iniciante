<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>tela de login</title>
</head>
<body>

    <div class="container">
        <h2>login</h2>
        <form id="login-form">
            <div class="email">
                <label>Email:</label>
                <input type="email" id="name-input" placeholder="name@email" required>
            </div>
            <div class="key">
                <label>Password:</label>
                <input type="password" id="password-input" placeholder="your password" required>
            </div>
            <button>send</button>
        </form>
    </div>

</body>
</html>
