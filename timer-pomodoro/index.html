<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pomodoro</h1>
        
        <div class="timer-display">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>

        <div class="controls">
            <button id="start" class="btn-start">Iniciar</button>
            <button id="pause" class="btn-pause">Pausar</button>
            <button id="reset" class="btn-reset">Resetar</button>
        </div>

        <div class="modes">
            <button onclick="setTimer(25)">Foco</button>
            <button onclick="setTimer(5)">Pausa Curta</button>
            <button onclick="setTimer(15)">Pausa Longa</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
